name: Design documentation

on:
  pull_request:
    paths:
      - "game-design/**"
      - "tools/validate-design-docs.ps1"
      - "AGENTS.md"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - "game-design/**"
      - "tools/validate-design-docs.ps1"
      - "AGENTS.md"
      - "README.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate canonical design system
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tools/validate-design-docs.ps1
